name: Release

# Trigger ONLY on git tag push of v<semver>. Push to main / PRs does nothing.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Released artifacts require write access to publish a release.
permissions:
  contents: write

# Cargo target-dir strategy:
#   - CI uses the default `src-tauri/target/` so the Swatinem/rust-cache
#     step can actually find and reuse build artifacts across runs.
#   - Local Windows devs who hit the Dropbox file-lock collision can set
#     `CARGO_TARGET_DIR` as a USER-level env var (see .cargo/config.toml).

jobs:
  linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust toolchain (host target only)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build deps (webkit2gtk + AppImage tooling)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install npm deps (postinstall patches three-stdlib)
        run: npm ci

      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          NOTES=$(node scripts/release-notes.mjs "$VERSION" || echo "")
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install tauri-cli
        # `cargo tauri build` is a CARGO SUBCOMMAND provided by the
        # `tauri-cli` crate (= `cargo-tauri` binary). `dtolnay/rust-toolchain`
        # installs only Rust; tauri-cli is a separate crate that must be
        # installed on the runner or the build errors with
        # "no such command: tauri" (exit 101).
        # Pin ^2.11 to match our `tauri = "2.11.3"` runtime; --locked makes
        # registry resolution reproducible across runs.
        run: cargo install tauri-cli --locked --version "^2.11"

      - name: Build Linux AppImage + updater payloads
        # tauri-action@v0/@v1 silently dropped Tauri v2 updater payloads
        # (.sig, .AppImage.tar.gz, .nsis.zip, latest.json). Build via the
        # CLI directly so EVERY artifact lands on disk under
        # src-tauri/target/release/bundle/ and can be uploaded explicitly
        # by softprops below.
        run: cargo tauri build --bundles appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build updater manifest (Linux entry)
        # Linux runs first. There's no existing remote latest.json yet,
        # so the script builds a fresh manifest from the local *.sig +
        # tar.gz files only and writes latest.json to the repo root.
        run: node scripts/build-manifest.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Domination ${{ github.ref_name }}'
          body: ${{ steps.notes.outputs.NOTES }}
          prerelease: false
          # softprops overwrites by default, so the second job (windows)
          # can clobber the linux-uploaded latest.json with the merged
          # manifest that contains both platforms.
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.sig
            latest.json

  windows:
    # SERIALIZE: the Windows job waits for the Linux job to finish so
    # tauri-action@v0's latest.json generation is deterministic. If both
    # jobs ran in parallel, each would call `tauri-apps/tauri-action@v0`
    # against the same tag, race on `latest.json` upload, and the final
    # file would only contain whichever platform's tauri-action
    # invocation finished last. Serializing guarantees the Windows job
    # runs SECOND and overwrites `latest.json` with the union of both
    # platforms' signed manifests.
    needs: linux
    name: Build Windows NSIS installer
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust toolchain (Windows MSVC target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps (postinstall patches three-stdlib)
        run: npm ci

      # Re-derive the release notes so this job can pass releaseBody too.
      # The linux job's `steps.notes` output is not visible cross-job —
      # GitHub Actions does not propagate step outputs between parallel
      # jobs, so each platform job re-extracts the same CHANGELOG block
      # independently. The result feeds tauri-action's releaseBody on
      # both uploads; whichever job finishes last wins the final body,
      # but since both produce identical text, this is deterministic.
      # `shell: bash` is REQUIRED on windows-latest because the default
      # shell is PowerShell, where $(echo ... | sed ...) is a syntax
      # error (PowerShell parses $(...) as a subexpression).
      - name: Extract CHANGELOG section for this tag
        id: notes
        shell: bash
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          NOTES=$(node scripts/release-notes.mjs "$VERSION" || echo "")
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install tauri-cli
        # See matching comment in the linux job: tauri-cli is a separate
        # crate from tauri itself and `dtolnay/rust-toolchain` doesn't
        # provide it. Without this step the runner errors with
        # "no such command: tauri".
        run: cargo install tauri-cli --locked --version "^2.11"

      - name: Build Windows NSIS + updater payloads
        # See the matching comment in the linux job. CLI-direct build so
        # .exe + .nsis.zip + their signatures all land on disk for the
        # explicit softprops upload below.
        run: cargo tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Self-sign Windows installer (Authenticode, to clear AV false positives)
        # Unsigned NSIS installers from new publishers trigger heuristic
        # AV detections like Kaspersky `UDS:Trojan-PSW.Win64.Disco.sbw`
        # even on legitimate software. Adding an Authenticode signature
        # by ANY publisher (even self-signed) raises the AV trust floor
        # enough to stop the false positive. Per CI run we generate an
        # ephemeral self-signed `CodeSigningCert` via PowerShell,
        # then call `Set-AuthenticodeSignature` with SHA-256 and a
        # DigiCert RFC3161 timestamp (graceful fallback if the
        # timestamp request fails - the signature still kills the AV
        # false positive, it just expires when the cert does).
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host '==> Generating ephemeral self-signed code-signing cert'
          $cert = New-SelfSignedCertificate `
            -Subject 'CN=Domination Dev' `
            -CertStoreLocation 'Cert:\CurrentUser\My' `
            -Type CodeSigningCert `
            -KeyUsage DigitalSignature `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -NotAfter (Get-Date).AddYears(5)

          $exe = Get-ChildItem -Path 'src-tauri/target/release/bundle/nsis' -Filter '*setup.exe' -Recurse | Select-Object -First 1
          if (-not $exe) { throw 'no NSIS setup.exe found under src-tauri/target/release/bundle/nsis' }

          Write-Host "==> Self-signing $($exe.Name) with SHA-256 + DigiCert RFC3161 timestamp"
          try {
            Set-AuthenticodeSignature `
              -FilePath $exe.FullName `
              -Certificate $cert `
              -HashAlgorithm SHA256 `
              -TimestampServer 'http://timestamp.digicert.com'
          } catch {
            Write-Warning "Timestamp request failed (network/TSA outage). Falling back to untimestamped sign - still kills AV FP, just expires with the cert."
            Set-AuthenticodeSignature `
              -FilePath $exe.FullName `
              -Certificate $cert `
              -HashAlgorithm SHA256
          }

          $sig = Get-AuthenticodeSignature -FilePath $exe.FullName
          Write-Host "==> Signature status: $($sig.Status) | Signer: $($sig.SignerCertificate.Subject) | SignatureType: $($sig.SignatureType)"

          # `Get-AuthenticodeSignature` calls WinVerifyTrust which REQUIRES
          # the certificate to chain to a trusted CA root. Self-signed certs
          # ALWAYS return UnknownError ("A certificate chain processed correctly,
          # but terminated in a root certificate which is not trusted by the
          # trust provider") even when the embedded Authenticode signature is
          # cryptographically valid and present in the PE. The Status code
          # is therefore misleading for self-signed workflows. What we
          # actually need to verify is:
          #   (a) SignatureType != None  -> a sig blob WAS written into the
          #       file's security directory by Set-AuthenticodeSignature
          #   (b) SignerCertificate.Subject matches our CN=Domination Dev
          # Both confirm the Authenticode blob is embedded, which is exactly
          # what AV heuristics (Kaspersky UDS Disco.sbw, Defender SmartScreen,
          # ESET) check to short-circuit the unsigned-installer flagging.
          if ($sig.SignatureType -eq 'None') {
            throw "No Authenticode signature embedded; Set-AuthenticodeSignature failed silently"
          }
          if ($sig.SignerCertificate.Subject -ne 'CN=Domination Dev') {
            throw "Signer is $($sig.SignerCertificate.Subject), expected CN=Domination Dev"
          }
          Write-Host "==> Authenticode signature verified: present, embedded, signer matches. AV FP fix landed."

      - name: Merge updater manifest (Windows entry with Linux)
        # Windows runs SECOND via `needs: linux`. The script fetches the
        # linux-uploaded latest.json from the release, keeps the linux
        # entry, adds the windows entry from the local .sig, and writes
        # the merged file back. softprops then re-uploads with
        # overwrite:true, clobbering the linux-only manifest.
        run: node scripts/build-manifest.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Domination ${{ github.ref_name }}'
          body: ${{ steps.notes.outputs.NOTES }}
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.sig
            latest.json

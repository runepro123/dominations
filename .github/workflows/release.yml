name: Release

# Trigger ONLY on git tag push of v<semver>. Push to main / PRs does nothing.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# No GitHub Releases are published by this workflow (Cloudflare R2 is
# the sole updater host), so the default GITHUB_TOKEN scope
# (`contents: read`) is sufficient: it covers `actions/checkout@v4`
# for both jobs. R2 uploads use AWS CLI with credentials fetched from
# `secrets.R2_ACCESS_KEY_ID` / `R2_SECRET_ACCESS_KEY`, not GitHub
# credentials, so no elevated GitHub permission is needed.
# permissions: <default - contents: read>

# Cargo target-dir strategy:
#   - CI uses the default `src-tauri/target/` so the Swatinem/rust-cache
#     step can actually find and reuse build artifacts across runs.
#   - Local Windows devs who hit the Dropbox file-lock collision can set
#     `CARGO_TARGET_DIR` as a USER-level env var (see .cargo/config.toml).

jobs:
  linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust toolchain (host target only)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build deps (webkit2gtk + AppImage tooling)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install npm deps (postinstall patches three-stdlib)
        run: npm ci

      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          NOTES=$(node scripts/release-notes.mjs "$VERSION" || echo "")
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install tauri-cli
        # `cargo tauri build` is a CARGO SUBCOMMAND provided by the
        # `tauri-cli` crate (= `cargo-tauri` binary). `dtolnay/rust-toolchain`
        # installs only Rust; tauri-cli is a separate crate that must be
        # installed on the runner or the build errors with
        # "no such command: tauri" (exit 101).
        # Pin ^2.11 to match our `tauri = "2.11.3"` runtime; --locked makes
        # registry resolution reproducible across runs.
        run: cargo install tauri-cli --locked --version "^2.11"

      - name: Materialize updater signing key
        # GH Secret values pasted by humans come in many shapes - sometimes
        # the raw 2-line `cat keypair.key` text, sometimes an extra base64
        # layer on top, sometimes empty. Auto-detect + write the canonical
        # rsign envelope to /tmp/keypair.key so the next step can use
        # Tauri-cli's `path:` prefix instead of relying on brittle inline
        # env var content. GitHub Actions' ${{ secrets.X }} interpolation
        # preserves multi-line values, so $KEY arrives with literal
        # newlines intact.
        run: |
          set -e
          KEY="$TAURI_SIGNING_PRIVATE_KEY"
          echo "==> Signing-key diagnostic"
          echo "    raw length    : ${#KEY}"
          echo "    first 40 chars: '${KEY:0:40}'"
          case "$KEY" in
            "untrusted comment:"*)
              FORMAT=RAW
              printf '%s' "$KEY" > /tmp/keypair.key
              ;;
            "dW50cnVzdGVk"*)
              # Looks like base64-of-rsign. Decode and re-verify.
              DECODED=$(printf '%s' "$KEY" | base64 -d 2>/dev/null || true)
              if [[ "$DECODED" == "untrusted comment:"* ]]; then
                FORMAT=BASE64_OF_RAW
                printf '%s' "$DECODED" > /tmp/keypair.key
              else
                FORMAT=BASE64_OF_UNKNOWN
                printf '%s' "$KEY" > /tmp/keypair.key
              fi
              ;;
            "")
              echo "    format        : EMPTY - TAURI_SIGNING_PRIVATE_KEY secret value is missing."
              echo "    aborting      : set the secret in repo Settings -> Secrets and variables -> Actions."
              exit 1
              ;;
            *)
              FORMAT=UNKNOWN
              printf '%s' "$KEY" > /tmp/keypair.key
              echo "    warning       : unrecognized envelope, writing raw and hoping tauri accepts."
              ;;
          esac
          echo "    format        : ${FORMAT}"
          chmod 600 /tmp/keypair.key
          echo "    file head     : $(head -1 /tmp/keypair.key | head -c 80)"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Linux AppImage + updater payloads
        # tauri-action@v0/@v1 silently dropped Tauri v2 updater payloads
        # (.sig, .AppImage.tar.gz, .nsis.zip, latest.json). Build via the
        # CLI directly so EVERY artifact lands on disk under
        # src-tauri/target/release/bundle/ and can be uploaded by the
        # R2 step below. Signing key was materialized in the step above;
        # the env var below points at the file via Tauri's `path:` prefix.
        run: cargo tauri build --bundles appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: path:/tmp/keypair.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build updater manifest (Linux entry)
        # Linux runs first. There's no R2 latest.json yet (this script
        # will write one at the end of this job), so the script builds
        # a fresh manifest from the local *.sig + tar.gz files only
        # and writes latest.json to the repo root. R2_PUBLIC_BASE is
        # REQUIRED (R2 is the sole updater host) and drives the url()
        # field for every platform entry.
        run: node scripts/build-manifest.mjs
        env:
          TAG_NAME: ${{ github.ref_name }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}

      - name: Upload to Cloudflare R2 (linux)
        # Mirror the github-release upload into Cloudflare R2 so the
        # updater endpoint at pub-<BUCKET_ID>.r2.dev/releases/latest.json
        # returns a populated manifest. .r2.dev domains bypass Cloudflare's
        # CDN by default so latest.json updates are immediate (no edge-cache
        # caveat). `aws s3 cp` uses AWS_ENDPOINT_URL env to route to R2
        # (S3-compatible API); awscli is preinstalled on ubuntu-latest.
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          aws s3 cp src-tauri/target/release/bundle/appimage/ s3://$R2_BUCKET/releases/$TAG_NAME/ \
            --recursive --exclude "*" --include "*.AppImage" --include "*.AppImage.tar.gz" --include "*.sig"
          # No-cache header on latest.json so a CI run mid-flight
          # between linux and windows jobs cannot get cache-frozen at
          # the linux-only manifest for hours.
          aws s3 cp latest.json s3://$R2_BUCKET/releases/latest.json --cache-control "no-cache, max-age=0"

  windows:
    # SERIALIZE: the Windows job waits for the Linux job to finish so
    # tauri-action@v0's latest.json generation is deterministic. If both
    # jobs ran in parallel, each would call `tauri-apps/tauri-action@v0`
    # against the same tag, race on `latest.json` upload, and the final
    # file would only contain whichever platform's tauri-action
    # invocation finished last. Serializing guarantees the Windows job
    # runs SECOND and overwrites `latest.json` with the union of both
    # platforms' signed manifests.
    needs: linux
    name: Build Windows NSIS installer
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust toolchain (Windows MSVC target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps (postinstall patches three-stdlib)
        run: npm ci

      # Re-derive the release notes so this job can pass releaseBody too.
      # The linux job's `steps.notes` output is not visible cross-job —
      # GitHub Actions does not propagate step outputs between parallel
      # jobs, so each platform job re-extracts the same CHANGELOG block
      # independently. The result feeds tauri-action's releaseBody on
      # both uploads; whichever job finishes last wins the final body,
      # but since both produce identical text, this is deterministic.
      # `shell: bash` is REQUIRED on windows-latest because the default
      # shell is PowerShell, where $(echo ... | sed ...) is a syntax
      # error (PowerShell parses $(...) as a subexpression).
      - name: Extract CHANGELOG section for this tag
        id: notes
        shell: bash
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          NOTES=$(node scripts/release-notes.mjs "$VERSION" || echo "")
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install tauri-cli
        # See matching comment in the linux job: tauri-cli is a separate
        # crate from tauri itself and `dtolnay/rust-toolchain` doesn't
        # provide it. Without this step the runner errors with
        # "no such command: tauri".
        run: cargo install tauri-cli --locked --version "^2.11"

      - name: Materialize updater signing key
        # Same logic as the linux materialize step. Detect raw vs
        # base64-of-raw and write to /tmp/keypair.key. `shell: bash` is
        # required because the matcher uses bash `${#KEY}` length syntax
        # (PowerShell parses `${VAR}` differently and would treat
        # `${#KEY}:0:40` as a runtime command).
        shell: bash
        run: |
          set -e
          KEY="$TAURI_SIGNING_PRIVATE_KEY"
          echo "==> Signing-key diagnostic"
          echo "    raw length    : ${#KEY}"
          echo "    first 40 chars: '${KEY:0:40}'"
          case "$KEY" in
            "untrusted comment:"*)
              FORMAT=RAW
              printf '%s' "$KEY" > /tmp/keypair.key
              ;;
            "dW50cnVzdGVk"*)
              # Looks like base64-of-rsign. Decode and re-verify.
              DECODED=$(printf '%s' "$KEY" | base64 -d 2>/dev/null || true)
              if [[ "$DECODED" == "untrusted comment:"* ]]; then
                FORMAT=BASE64_OF_RAW
                printf '%s' "$DECODED" > /tmp/keypair.key
              else
                FORMAT=BASE64_OF_UNKNOWN
                printf '%s' "$KEY" > /tmp/keypair.key
              fi
              ;;
            "")
              echo "    format        : EMPTY - TAURI_SIGNING_PRIVATE_KEY secret value is missing."
              echo "    aborting      : set the secret in repo Settings -> Secrets and variables -> Actions."
              exit 1
              ;;
            *)
              FORMAT=UNKNOWN
              printf '%s' "$KEY" > /tmp/keypair.key
              echo "    warning       : unrecognized envelope, writing raw and hoping tauri accepts."
              ;;
          esac
          echo "    format        : ${FORMAT}"
          chmod 600 /tmp/keypair.key
          echo "    file head     : $(head -1 /tmp/keypair.key | head -c 80)"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Windows NSIS + updater payloads
        # See the matching comment in the linux job. CLI-direct build so
        # .exe + .nsis.zip + their signatures all land on disk for the
        # explicit softprops upload below. Signing key was materialized
        # in the step above; the env var below points at the file via
        # Tauri's `path:` prefix.
        run: cargo tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: path:/tmp/keypair.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Self-sign Windows installer (Authenticode, to clear AV false positives)
        # Unsigned NSIS installers from new publishers trigger heuristic
        # AV detections like Kaspersky `UDS:Trojan-PSW.Win64.Disco.sbw`
        # even on legitimate software. Adding an Authenticode signature
        # by ANY publisher (even self-signed) raises the AV trust floor
        # enough to stop the false positive. Per CI run we generate an
        # ephemeral self-signed `CodeSigningCert` via PowerShell,
        # then call `Set-AuthenticodeSignature` with SHA-256 and a
        # DigiCert RFC3161 timestamp (graceful fallback if the
        # timestamp request fails - the signature still kills the AV
        # false positive, it just expires when the cert does).
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host '==> Generating ephemeral self-signed code-signing cert'
          $cert = New-SelfSignedCertificate `
            -Subject 'CN=Domination Dev' `
            -CertStoreLocation 'Cert:\CurrentUser\My' `
            -Type CodeSigningCert `
            -KeyUsage DigitalSignature `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -NotAfter (Get-Date).AddYears(5)

          $exe = Get-ChildItem -Path 'src-tauri/target/release/bundle/nsis' -Filter '*setup.exe' -Recurse | Select-Object -First 1
          if (-not $exe) { throw 'no NSIS setup.exe found under src-tauri/target/release/bundle/nsis' }

          Write-Host "==> Self-signing $($exe.Name) with SHA-256 + DigiCert RFC3161 timestamp"
          try {
            Set-AuthenticodeSignature `
              -FilePath $exe.FullName `
              -Certificate $cert `
              -HashAlgorithm SHA256 `
              -TimestampServer 'http://timestamp.digicert.com'
          } catch {
            Write-Warning "Timestamp request failed (network/TSA outage). Falling back to untimestamped sign - still kills AV FP, just expires with the cert."
            Set-AuthenticodeSignature `
              -FilePath $exe.FullName `
              -Certificate $cert `
              -HashAlgorithm SHA256
          }

          $sig = Get-AuthenticodeSignature -FilePath $exe.FullName
          Write-Host "==> Signature status: $($sig.Status) | Signer: $($sig.SignerCertificate.Subject) | SignatureType: $($sig.SignatureType)"

          # `Get-AuthenticodeSignature` calls WinVerifyTrust which REQUIRES
          # the certificate to chain to a trusted CA root. Self-signed certs
          # ALWAYS return UnknownError ("A certificate chain processed correctly,
          # but terminated in a root certificate which is not trusted by the
          # trust provider") even when the embedded Authenticode signature is
          # cryptographically valid and present in the PE. The Status code
          # is therefore misleading for self-signed workflows. What we
          # actually need to verify is:
          #   (a) SignatureType != None  -> a sig blob WAS written into the
          #       file's security directory by Set-AuthenticodeSignature
          #   (b) SignerCertificate.Subject matches our CN=Domination Dev
          # Both confirm the Authenticode blob is embedded, which is exactly
          # what AV heuristics (Kaspersky UDS Disco.sbw, Defender SmartScreen,
          # ESET) check to short-circuit the unsigned-installer flagging.
          if ($sig.SignatureType -eq 'None') {
            throw "No Authenticode signature embedded; Set-AuthenticodeSignature failed silently"
          }
          if ($sig.SignerCertificate.Subject -ne 'CN=Domination Dev') {
            throw "Signer is $($sig.SignerCertificate.Subject), expected CN=Domination Dev"
          }
          Write-Host "==> Authenticode signature verified: present, embedded, signer matches. AV FP fix landed."

      - name: Merge updater manifest (Windows entry with Linux)
        # Windows runs SECOND via `needs: linux`. The script fetches
        # the R2-uploaded latest.json (kept by the linux job's R2
        # step), keeps the linux entry, adds the windows entry from
        # the local .sig, and composes all platform urls against the
        # R2 base url. The Upload-to-R2 step below clobbers the R2
        # linux-only manifest with the merged linux+windows manifest
        # (`--cache-control no-cache` prevents any edge-cache lag
        # between jobs).
        run: node scripts/build-manifest.mjs
        env:
          TAG_NAME: ${{ github.ref_name }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}

      - name: Upload to Cloudflare R2 (windows)
        # Mirror the github-release upload into Cloudflare R2. Runs SECOND
        # via `needs: linux`, so this step's latest.json cp clobbers R2's
        # linux-only manifest with the merged linux+windows manifest,
        # matching the softprops overwrite behaviour above.
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          aws s3 cp src-tauri/target/release/bundle/nsis/ s3://$R2_BUCKET/releases/$TAG_NAME/ \
            --recursive --exclude "*" --include "*.exe" --include "*.nsis.zip" --include "*.sig"
          aws s3 cp latest.json s3://$R2_BUCKET/releases/latest.json --cache-control "no-cache, max-age=0"

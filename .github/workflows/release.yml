name: Release

# Trigger ONLY on git tag push of v<semver>. Push to main / PRs does nothing.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Released artifacts require write access to publish a release.
permissions:
  contents: write

# Cargo target-dir strategy:
#   - CI uses the default `src-tauri/target/` so the Swatinem/rust-cache
#     step can actually find and reuse build artifacts across runs.
#   - Local Windows devs who hit the Dropbox file-lock collision can set
#     `CARGO_TARGET_DIR` as a USER-level env var (see .cargo/config.toml).

jobs:
  linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust toolchain (host target only)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build deps (webkit2gtk + AppImage tooling)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install npm deps (postinstall patches three-stdlib)
        run: npm ci

      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          NOTES=$(node scripts/release-notes.mjs "$VERSION" || echo "")
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build, sign, upload Linux AppImage
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Domination ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.NOTES }}
          prerelease: false
          # Force updater manifest generation. tauri-action@v0's auto-detect
          # of Tauri v2's `plugins.updater` block (in tauri.conf.json) is
          # silently failing for this project, causing the action to skip
          # the latest.json upload entirely. Setting includeUpdaterJson
          # explicitly overrides that auto-detect and forces the action
          # to sign + upload the manifest. Default is true, but the
          # action's internal logic downgrades to false when its parser
          # misses the v2 updater config, so being explicit is required.
          includeUpdaterJson: true
          # Native Linux build: host target is x86_64-unknown-linux-gnu.
          # No --target needed; tauri-action defaults to host. --bundles
          # picks the AppImage output for this platform only.
          args: --bundles appimage

  windows:
    # SERIALIZE: the Windows job waits for the Linux job to finish so
    # tauri-action@v0's latest.json generation is deterministic. If both
    # jobs ran in parallel, each would call `tauri-apps/tauri-action@v0`
    # against the same tag, race on `latest.json` upload, and the final
    # file would only contain whichever platform's tauri-action
    # invocation finished last. Serializing guarantees the Windows job
    # runs SECOND and overwrites `latest.json` with the union of both
    # platforms' signed manifests.
    needs: linux
    name: Build Windows NSIS installer
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust toolchain (Windows MSVC target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps (postinstall patches three-stdlib)
        run: npm ci

      # Re-derive the release notes so this job can pass releaseBody too.
      # The linux job's `steps.notes` output is not visible cross-job —
      # GitHub Actions does not propagate step outputs between parallel
      # jobs, so each platform job re-extracts the same CHANGELOG block
      # independently. The result feeds tauri-action's releaseBody on
      # both uploads; whichever job finishes last wins the final body,
      # but since both produce identical text, this is deterministic.
      # `shell: bash` is REQUIRED on windows-latest because the default
      # shell is PowerShell, where $(echo ... | sed ...) is a syntax
      # error (PowerShell parses $(...) as a subexpression).
      - name: Extract CHANGELOG section for this tag
        id: notes
        shell: bash
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          NOTES=$(node scripts/release-notes.mjs "$VERSION" || echo "")
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build, sign, upload Windows NSIS
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Domination ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.NOTES }}
          prerelease: false
          # See the matching comment in the linux job above — this flag
          # forces tauri-action@v0 to generate latest.json even when its
          # auto-detect of the v2 plugins.updater block fails. The
          # windows job (running second via `needs: linux`) will then
          # read the linux-uploaded latest.json, append the NSIS entry,
          # and re-upload the merged manifest.
          includeUpdaterJson: true
          # Native Windows MSVC build. No --target needed on Windows
          # hosts (toolchain is already MSVC). --bundles picks the NSIS
          # installer format; webview2 is bundled by the installer's
          # bootstrapper as needed by the target machine.
          args: --bundles nsis

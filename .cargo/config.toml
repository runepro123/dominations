# Cargo config for this repo.
#
# Empty on purpose. Earlier history:
#   - The original target-dir override redirected cargo's build artifacts
#     to a non-Dropbox path on Windows (Dropbox's file watcher locks the
#     linker temp dir, causing `os error 32` during `cargo build`).
#   - That hardcoded Windows path (`C:/Users/...`) was a literal string
#     that cargo joined onto the workspace root on Linux CI — the colon in
#     the drive letter corrupted LD_LIBRARY_PATH, so cross-platform CI
#     builds blew up.
#
# Where the override lives now:
#   - CI uses cargo's default target-dir (`src-tauri/target/`) so the
#     Swatinem/rust-cache step in the release workflow restores cleanly.
#   - Local devs (e.g. on Windows + Dropbox) set the same env var as a
#     USER-level variable to redirect artifacts out of the watched folder:
#       [Environment]::SetEnvironmentVariable(
#         "CARGO_TARGET_DIR",
#         "C:\Users\goorr\AppData\Local\Temp\domination-target",
#         "User"
#       )
#     This applies to every cargo invocation on the machine with no repo
#     config and ships cross-platform-safe.

# Intentionally no [build] target-dir here.
